<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UBMTS Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f4f7f6;
        color: #333;
      }

      header {
        background: #4a148c;
        color: white;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 {
        font-size: 1.2rem;
        font-weight: 600;
      }
      header button {
        background: transparent;
        color: white;
        border: 1px solid white;
        padding: 6px 14px;
        border-radius: 4px;
        cursor: pointer;
      }
      header button:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      main {
        max-width: 960px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      section {
        background: white;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        border: 1px solid #ddd;
      }
      section h3 {
        margin-bottom: 1rem;
        color: #4a148c;
      }

      form input,
      form select,
      form button {
        display: block;
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
      }
      form button {
        background: #4a148c;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }
      form button:hover {
        background: #38006b;
      }

      .session-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
        background: #fafafa;
      }
      .session-card h3 {
        margin-bottom: 6px;
        color: #4a148c;
      }
      .session-card p {
        font-size: 14px;
        margin-bottom: 4px;
      }
      .session-card button {
        margin-top: 8px;
        margin-right: 8px;
        padding: 7px 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      .btn-register,
      .btn-approve {
        background: #4a148c;
        color: white;
      }
      .btn-cancel,
      .btn-delete,
      .btn-delete-admin,
      .btn-remove {
        background: #d32f2f;
        color: white;
      }

      #sessionMsg {
        color: green;
        margin-top: 8px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="welcome">University Of Belize Math Tutoring System</h1>
      <button id="logoutBtn">Logout</button>
    </header>

    <main>
      <!-- STUDENT -->
      <div id="studentView" style="display: none">
        <div id="sessions"></div>
      </div>

      <!-- TUTOR -->
      <div id="tutorView" style="display: none">
        <div id="tutorActions"></div>
      </div>

      <!-- ADMIN -->
      <div id="adminView" style="display: none">
        <div id="adminActions"></div>
      </div>
    </main>

    <script>
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("user");
        window.location.href = "index.html";
      });
    </script>
    <script type="module" src="dashboard.js"></script>
  </body>
</html>
